[workspace]
members = ["candle-gen", "candle-gen-sdxl", "candle-gen-z-image", "candle-gen-flux", "candle-gen-flux2", "candle-gen-qwen-image", "candle-gen-wan", "candle-gen-ltx", "candle-gen-svd", "candle-gen-joycaption", "candle-gen-lens", "candle-gen-chroma", "candle-gen-prompt-refine", "candle-gen-kolors", "candle-gen-sensenova", "candle-gen-face", "candle-gen-instantid"]
resolver = "2"

# Single source of truth for the deps shared across the workspace (mirrors mlx-gen's F-151). The
# next candle bump or gen-core pin bump is then a one-line edit here rather than N synchronized
# ones — a missed crate would otherwise resolve two distinct `sceneworks-gen-core` builds and the
# provider crate would register into one `inventory` registry while the consumer queries another
# ("engine not found" at RUNTIME, not a compile error — see scripts/check-gen-core-skew.sh).
[workspace.dependencies]
# Backend-neutral contract layer (epic 3720). lib name is `gen_core` (neutral import path). This is
# pinned by git SHA to the SAME rev the SceneWorks worker pins — do NOT drift it, or the skew gate
# fires. candle-gen is the Windows/CUDA sibling of mlx-gen; both satisfy this one contract.
# Bumped `1a97909` -> `41c95a1` (sc-5126): the worker moved its gen-core pin to `41c95a1` for the
# Bernini provider (sc-4707, mlx-gen #433 — +11 additive lines in `weightsmeta.rs`, no API removed),
# so the Lens inference cutover re-pins candle-gen to MATCH or the worker's `--features backend-candle`
# graph resolves two gen-core revs and the skew gate fires (one inventory registry per rev). candle-gen
# consumes none of the new weightsmeta surface; the bump is purely to keep the single-rev invariant.
# Bumped `41c95a1` -> `af190c7` (sc-5500): adds the additive `TextLlm` contract (mlx-gen #448) that
# `candle-gen-prompt-refine` implements. The worker re-pins to MATCH at its own cutover (sc-5525).
# Bumped `af190c7` -> `fa0f75b` (sc-5551, candle-gen #55): lockstep with the worker's mlx pin bump
# (SceneWorks #664) for the video-gen per-step cancel; gen-core additive, no candle surface change.
# Bumped `fa0f75b` -> `d3ec5e5` (sc-5552): lockstep with the worker adding the native MLX
# `mlx-gen-prompt-refine` provider (mlx-gen #457). gen-core is BYTE-IDENTICAL `fa0f75b` -> `d3ec5e5`
# (the merge only adds an mlx provider crate); the bump is purely to keep the single-rev skew invariant
# with the worker's mlx pin at its sc-5552 cutover.
# The `sceneworks-gen-core-testkit` dev-deps below are bumped in lockstep for the same reason.
# Bumped `d3ec5e5` -> `871d5cc` (sc-5490, epic 5480): the additive gen-core `FaceEmbedder` contract
# (mlx-gen PR #458, merged to main) that `candle-gen-face` implements. The worker re-pins to MATCH when
# it wires the candle InstantID/PuLID providers (sc-5491/5492); until then candle-gen leads this rev.
# Bumped `871d5cc` -> `24c89c9` (sc-5491, epic 5480): catch up to the worker's mlx-gen pin, which
# overtook candle-gen when mlx-gen #459 (sc-5637 training-preview samples) landed on main. The ONLY
# gen-core delta is `train.rs` +39 additive lines (new `TrainingConfig` sample_* fields with
# defaults + a `TrainingProgress::Sample` variant) — candle-gen has no trainers, so no surface
# change; this is purely the alignment the worker's candle lane needs to resolve ONE gen-core rev.
# Bumped `24c89c9` -> `40063d5` (sc-5491, epic 5480): the worker's mlx-gen pin moved again
# (mlx-gen #460 smokes + #461 SCAIL-2 Q4 + #462 sc-5451 SCAIL-2 inference LoRA), so re-pin in lockstep
# to keep the worker's `--features backend-candle` lane on ONE gen-core rev. gen-core is BYTE-IDENTICAL
# `24c89c9` -> `40063d5` (the range is pure mlx-gen-scail2 Rust); zero candle surface change.
# Bumped `40063d5` -> `891bee4` (sc-5700, epic 5439): the worker's mlx-gen pin moved again to catch up
# to mlx-gen main (#463 sc-5681 high-res f32/tiled decode + DiT activation chunking, #464 sc-5690 VAE
# tiling regression coverage, #465 sc-5684 SCAIL-2 lightx2v lightning diff-patch LoRA), so re-pin in
# lockstep to keep the worker's `--features backend-candle` lane on ONE gen-core rev. The gen-core delta
# `40063d5` -> `891bee4` is a SINGLE additive `tiling.rs` *test* case (the z48 vae22 combined-plan
# coverage); the public gen-core surface is BYTE-IDENTICAL → zero candle surface change.
sceneworks-gen-core = { git = "https://github.com/michaeltrefry/mlx-gen", rev = "891bee46e7ec7d7a5b3074eaea183d2e87be9d2a" }
# candle tensor backend (CPU on Mac by default; Metal under the `metal` feature; CUDA on Windows
# under the `cuda` feature). Pinned to candle git main (post-0.10.2) — REQUIRED for Blackwell
# sm_120: the crates.io 0.10.2 release fails `CUDA_ERROR_INVALID_PTX` at the first candle-kernels
# kernel the moment candle-transformers is linked (repo-wide; SDXL + z-image both; plain candle-core
# works). Rev 65ecb58 clears it — verified by the SDXL + Z-Image GPU conformance on RTX PRO 6000
# (sm_120). All three crates share ONE rev so the whole tree is one candle build. Re-pin in lockstep.
candle-core = { git = "https://github.com/huggingface/candle", rev = "65ecb58c11d2244a7e60c71bdcdb19b15b0a4343" }
candle-nn = { git = "https://github.com/huggingface/candle", rev = "65ecb58c11d2244a7e60c71bdcdb19b15b0a4343" }
# SDXL building blocks (dual CLIP, UNet2DConditionModel, VAE, schedulers) — the candle-gen-sdxl
# pipeline (sc-3675) reuses these, mirroring how the spike (epic 3494) built on candle-transformers.
candle-transformers = { git = "https://github.com/huggingface/candle", rev = "65ecb58c11d2244a7e60c71bdcdb19b15b0a4343" }
# HF tokenizers (CLIP-L + CLIP-bigG tokenizer.json) and snapshot/file resolution for SDXL weights.
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
hf-hub = { version = "0.4", default-features = false, features = ["ureq", "rustls-tls"] }
# Fixed-algorithm CPU RNG for deterministic, launch-portable initial latent noise (sc-3673) — NOT
# candle's CUDA `set_seed`. `StdRng` (ChaCha) is reproducible across launches for a given seed;
# `rand_distr::StandardNormal` draws the N(0,1) latent. Versions match candle's own tree (no dup).
rand = "0.9"
rand_distr = "0.5"
# Link-time model registration (the DI-container stand-in) — matches gen-core's `inventory`.
inventory = "0.3"
# Error bridge (CandleError -> gen_core::Error). Major matches mlx-gen (thiserror 2).
thiserror = "2"
# JSON parsing for the PEFT/diffusers `lora_adapter_metadata` config blob (sc-5374) — the inference
# adapter merge reads `lora_alpha`/`r` (+ per-module `alpha_pattern`/`rank_pattern`) out of it when a
# file carries no per-target `.alpha` tensor. Already in the lock via `safetensors`; surfaced direct.
serde_json = "1"
